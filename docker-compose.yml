services:
  arangodb:
    image: arangodb/arangodb:3.12
    container_name: code-intel-arangodb
    environment:
      ARANGO_ROOT_PASSWORD: code_intel_dev
    ports:
      - "8529:8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null --header='Authorization: Basic cm9vdDpjb2RlX2ludGVsX2Rldg==' http://127.0.0.1:8529/_api/version && echo 'OK'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  code-intel-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code-intel-mcp
    depends_on:
      arangodb:
        condition: service_healthy
    environment:
      JOERN_CLI_PATH: /opt/joern/joern-cli
      ARANGO_HOST: http://arangodb:8529
      ARANGO_USER: root
      ARANGO_PASS: code_intel_dev
      ARANGO_DB: code_intel
    volumes:
      - project-data:/projects:ro
    stdin_open: true
    restart: unless-stopped

volumes:
  arangodb_data:
  project-data: